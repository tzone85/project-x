name: Bug Report
description: Report a bug in Project X
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run `px ...`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: e.g., macOS 14, Ubuntu 24.04
  - type: input
    id: version
    attributes:
      label: px version
      placeholder: e.g., 0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant log output
      render: shell
